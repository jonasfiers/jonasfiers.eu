<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG image source</title>
<style>
  @font-face{
    font-family:'Cabinet Grotesk';
    src:url('fonts/CabinetGrotesk-Variable.woff2') format('woff2-variations');
    font-weight:300 900; font-style:normal;
  }
  @font-face{
    font-family:'Satoshi';
    src:url('fonts/Satoshi-Variable.woff2') format('woff2-variations');
    font-weight:300 900; font-style:normal;
  }
  @font-face{
    font-family:'JetBrains Mono';
    src:url('fonts/JetBrainsMono-Medium.woff2') format('woff2');
    font-weight:500; font-style:normal;
  }
  :root{
    --bg:#12172B;
    --text:#EDEFF7;
    --text-dim:#9AA3C0;
    --lime:#C6F135;
    --coral:#FF6F59;
    --mono:'JetBrains Mono', monospace;
    --sans:'Satoshi', sans-serif;
    --display:'Cabinet Grotesk', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:630px;overflow:hidden;background:var(--bg);}
  body{position:relative;font-family:var(--sans);}

  .network{position:absolute;inset:0;width:1200px;height:630px;}

  .vignette{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 900px 630px at 30% 45%, rgba(18,23,43,0.94) 0%, rgba(18,23,43,0.72) 45%, rgba(18,23,43,0.28) 78%, rgba(18,23,43,0) 100%);
  }

  .content{position:absolute;left:80px;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;max-width:760px;}

  .eyebrow{
    font-family:var(--mono);
    font-size:20px;
    color:var(--lime);
    margin-bottom:22px;
    letter-spacing:0.01em;
  }
  h1{
    font-family:var(--display);
    font-size:96px;
    font-weight:700;
    color:var(--text);
    line-height:1;
    margin-bottom:14px;
  }
  .role{
    font-family:var(--display);
    font-size:32px;
    font-weight:500;
    color:var(--text-dim);
    margin-bottom:26px;
  }
  .tagline{
    font-size:26px;
    color:var(--text-dim);
    max-width:620px;
    line-height:1.45;
  }

  .sig{
    position:absolute;
    right:44px;
    bottom:36px;
    font-family:var(--mono);
    font-size:18px;
    color:var(--text-dim);
    letter-spacing:0.02em;
  }
</style>
</head>
<body>

<div class="content">
